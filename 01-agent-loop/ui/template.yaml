AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  TechCo Support Agent Demo UI
  Lambda (IAM Function URL) + S3 + CloudFront + Lambda@Edge SigV4 signer

Parameters:
  ClaudeModel:
    Type: String
    Default: us.anthropic.claude-sonnet-4-6
    Description: Bedrock cross-region inference profile ID.
  RefundThreshold:
    Type: String
    Default: "500"
    Description: Dollar threshold above which refunds are blocked by the hook

Globals:
  Function:
    Timeout: 60
    MemorySize: 512

Resources:

  # ─── Lambda (scenario runner) ────────────────────────────────────────────────
  AgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-agent"
      Runtime: python3.13
      Architectures: [x86_64]
      CodeUri: backend/
      Handler: lambda_handler.lambda_handler
      Description: Runs Claude certification demo scenarios
      Environment:
        Variables:
          CLAUDE_MODEL: !Ref ClaudeModel
          REFUND_THRESHOLD: !Ref RefundThreshold
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub "arn:aws:bedrock:*::foundation-model/*"
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*"
      FunctionUrlConfig:
        # IMPORTANT: Must be AWS_IAM, not NONE. AuthType: NONE triggers Palisade
        # security findings (world-accessible Lambda). The Lambda@Edge signer
        # handles SigV4 signing so browsers don't need IAM credentials.
        AuthType: AWS_IAM

  # ─── Allow Lambda@Edge role to invoke the Function URL ───────────────────────
  # GOTCHA: Both resource-based permissions are required. InvokeFunctionUrl alone
  # produces AccessDeniedException. The edge signer needs InvokeFunction too.
  EdgeSignerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AgentFunction
      Action: lambda:InvokeFunctionUrl
      Principal: !GetAtt EdgeSignerFunctionRole.Arn
      FunctionUrlAuthType: AWS_IAM

  EdgeSignerInvokePermission2:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AgentFunction
      Action: lambda:InvokeFunction
      Principal: !GetAtt EdgeSignerFunctionRole.Arn

  # ─── Lambda@Edge (SigV4 signer for /api origin requests) ─────────────────────
  # WHY Lambda@Edge instead of CloudFront OAC?
  # OAC cannot sign POST request bodies. Lambda Function URLs require the payload
  # hash (x-amz-content-sha256) for POST/PUT, but OAC only signs headers.
  # Browsers can't compute SigV4 signatures, so Lambda@Edge does it at the edge.
  # See DEPLOYMENT.md "Why Lambda@Edge instead of CloudFront OAC?" for details.
  EdgeSignerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-edge-signer"
      Runtime: nodejs20.x
      CodeUri: edge-signer/
      Handler: index.handler
      MemorySize: 128
      Timeout: 10
      AutoPublishAlias: live
      Description: Signs /api origin requests with SigV4 (origin-request event)
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - edgelambda.amazonaws.com
            Action: sts:AssumeRole
      # GOTCHA: Do NOT add Condition: { StringEquals: { lambda:FunctionUrlAuthType: AWS_IAM } }
      # to this policy. It looks correct but causes AccessDeniedException at runtime.
      # Scope by Resource ARN instead.
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunctionUrl
                - lambda:InvokeFunction
              Resource: !GetAtt AgentFunction.Arn
        - Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: "arn:aws:logs:*:*:*"

  # ─── S3 (frontend static files) ──────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ─── CloudFront OAC — S3 ─────────────────────────────────────────────────────
  S3OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-s3-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ─── CloudFront Distribution ─────────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${AWS::StackName} frontend"
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        PriceClass: PriceClass_100

        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt S3OriginAccessControl.Id

          - Id: LambdaOrigin
            DomainName: !Select
              - 2
              - !Split
                - "/"
                - !GetAtt AgentFunctionUrl.FunctionUrl
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
              OriginReadTimeout: 60

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          # Managed-CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true

        CacheBehaviors:
          - PathPattern: /api*
            TargetOriginId: LambdaOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachedMethods: [GET, HEAD]
            # Managed-CachingDisabled (API calls must not be cached)
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            # Managed-AllViewerExceptHostHeader
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            Compress: true
            LambdaFunctionAssociations:
              - EventType: origin-request
                LambdaFunctionARN: !Ref EdgeSignerFunction.Version
                # IMPORTANT: IncludeBody must be true for POST signing.
                # Without it, the edge signer can't read the request body
                # and the payload hash will be wrong → InvalidSignatureException.
                IncludeBody: true

        # SPA routing: S3 returns 403 for missing keys (private bucket) → serve index.html
        # GOTCHA: These apply globally to ALL origins, including Lambda. If the Lambda
        # origin returns 403 (e.g., bad SigV4 signature), this silently replaces it with
        # index.html — making it look like a routing problem instead of an auth problem.
        # When debugging API issues, temporarily remove these to see the real error.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

Outputs:
  CloudFrontDomain:
    Description: CloudFront distribution URL (your app's public URL)
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  FrontendBucketName:
    Description: S3 bucket name — sync your frontend build here
    Value: !Ref FrontendBucket

version = 0.1

# Single unified stack — both backends in one CloudFront distribution.
# Deploy with: sam build && sam deploy
[default.global.parameters]
stack_name = "claude-cert-demo"
region = "us-east-1"

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
# Optionally override the model at deploy time:
# parameter_overrides = "ClaudeModel=us.anthropic.claude-sonnet-4-6"
